<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PecuNovus — MetaMask Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }
    .logo { font-size: 2rem; margin-bottom: 0.5rem; }
    h1 { font-size: 1.4rem; color: #58a6ff; margin-bottom: 0.25rem; }
    p.subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 1.5rem; }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary   { background: #1f6feb; color: #fff; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-send      { background: #238636; color: #fff; }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.9rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #8b949e; }
    .info-value { color: #e6edf3; font-family: monospace; max-width: 260px; overflow: hidden; text-overflow: ellipsis; }
    .section { margin-top: 1.5rem; }
    .section h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; color: #8b949e; margin-bottom: 0.75rem; }
    .status {
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .status.ok    { background: #0f2a1a; color: #3fb950; border: 1px solid #238636; }
    .status.warn  { background: #2a1f00; color: #e3b341; border: 1px solid #9e6a03; }
    .status.err   { background: #2a0e0e; color: #f85149; border: 1px solid #da3633; }
    input[type=text], input[type=number] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .gap { margin-top: 0.75rem; }
    #send-result { font-size: 0.8rem; margin-top: 0.5rem; word-break: break-all; color: #3fb950; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🔷</div>
  <h1>PecuNovus Mainnet</h1>
  <p class="subtitle">Connect MetaMask to the PecuNovus RPC endpoint</p>

  <div id="status-box" class="status warn">MetaMask not connected</div>

  <!-- Step 1: Add Network -->
  <div class="section">
    <h2>Step 1 — Add Network</h2>
    <button id="btn-add" class="btn-secondary">Add PecuNovus to MetaMask</button>
  </div>

  <!-- Step 2: Connect wallet -->
  <div class="section">
    <h2>Step 2 — Connect Wallet</h2>
    <button id="btn-connect" class="btn-primary">Connect MetaMask</button>
  </div>

  <!-- Account info (hidden until connected) -->
  <div id="account-section" class="section" style="display:none">
    <h2>Account</h2>
    <div class="info-row"><span class="info-label">Address</span><span class="info-value" id="info-address">—</span></div>
    <div class="info-row"><span class="info-label">Balance</span><span class="info-value" id="info-balance">—</span></div>
    <div class="info-row"><span class="info-label">Chain ID</span><span class="info-value" id="info-chain">—</span></div>
    <div class="info-row"><span class="info-label">Latest Block</span><span class="info-value" id="info-block">—</span></div>
  </div>

  <!-- Send PECU (hidden until connected) -->
  <div id="send-section" class="section" style="display:none">
    <h2>Send PECU</h2>
    <input type="text" id="send-to" placeholder="Recipient address (0x...)" />
    <input type="number" id="send-amount" placeholder="Amount (PECU)" step="0.0001" min="0" />
    <button id="btn-send" class="btn-send gap">Send PECU</button>
    <div id="send-result"></div>
  </div>
</div>

<script type="module">
const PECU_CHAIN_ID  = 27272727;
const PECU_CHAIN_HEX = '0x19FAFB7';
const PECU_RPC       = 'https://mainnet.pecunovus.net/';

// ── Helpers ──────────────────────────────────────────────────────────────────

async function rpc(method, params = []) {
  const res = await fetch(PECU_RPC, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params }),
  });
  const { result, error } = await res.json();
  if (error) throw new Error(error.message);
  return result;
}

function hexToFloat(hex) {
  return Number(BigInt(hex)) / 1e18;
}

function setStatus(msg, type = 'warn') {
  const el = document.getElementById('status-box');
  el.textContent = msg;
  el.className = `status ${type}`;
}

// ── Add Network ───────────────────────────────────────────────────────────────

document.getElementById('btn-add').addEventListener('click', async () => {
  if (!window.ethereum) { setStatus('MetaMask not detected', 'err'); return; }
  try {
    await window.ethereum.request({
      method: 'wallet_addEthereumChain',
      params: [{
        chainId:           PECU_CHAIN_HEX,
        chainName:         'PecuNovus Mainnet',
        nativeCurrency:    { name: 'PECU', symbol: 'PECU', decimals: 18 },
        rpcUrls:           [PECU_RPC],
        blockExplorerUrls: ['https://pecunovus.net'],
      }],
    });
    setStatus('PecuNovus network added to MetaMask ✓', 'ok');
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  }
});

// ── Connect Wallet ────────────────────────────────────────────────────────────

document.getElementById('btn-connect').addEventListener('click', async () => {
  if (!window.ethereum) { setStatus('MetaMask not installed', 'err'); return; }

  try {
    // 1. Request accounts
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    const address  = accounts[0].toLowerCase();

    // 2. Switch to PecuNovus chain
    try {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: PECU_CHAIN_HEX }],
      });
    } catch (switchErr) {
      if (switchErr.code === 4902) {
        setStatus('Add the PecuNovus network first (Step 1)', 'warn');
        return;
      }
      throw switchErr;
    }

    // 3. Fetch data from RPC
    const [balanceHex, blockHex, chainHex] = await Promise.all([
      rpc('eth_getBalance', [address, 'latest']),
      rpc('eth_blockNumber'),
      rpc('eth_chainId'),
    ]);

    const balance  = hexToFloat(balanceHex).toFixed(6);
    const blockNum = parseInt(blockHex, 16);
    const chainId  = parseInt(chainHex, 16);

    // 4. Update UI
    document.getElementById('info-address').textContent = address;
    document.getElementById('info-balance').textContent = balance + ' PECU';
    document.getElementById('info-block').textContent   = '#' + blockNum.toLocaleString();
    document.getElementById('info-chain').textContent   = chainId + ' (PecuNovus)';
    document.getElementById('account-section').style.display = '';
    document.getElementById('send-section').style.display    = '';

    setStatus(`Connected: ${address.slice(0, 6)}...${address.slice(-4)}`, 'ok');

  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  }
});

// ── Send PECU via MetaMask ────────────────────────────────────────────────────

document.getElementById('btn-send').addEventListener('click', async () => {
  const to     = document.getElementById('send-to').value.trim();
  const amount = parseFloat(document.getElementById('send-amount').value);
  const result = document.getElementById('send-result');

  if (!to || !/^0x[0-9a-fA-F]{40}$/.test(to)) {
    result.style.color = '#f85149';
    result.textContent = 'Invalid recipient address';
    return;
  }
  if (isNaN(amount) || amount <= 0) {
    result.style.color = '#f85149';
    result.textContent = 'Invalid amount';
    return;
  }

  try {
    result.style.color = '#e3b341';
    result.textContent = 'Waiting for MetaMask confirmation...';

    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
    const from     = accounts[0];
    const valueHex = '0x' + BigInt(Math.round(amount * 1e18)).toString(16);

    // MetaMask handles signing and submitting via eth_sendTransaction
    const txHash = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from,
        to,
        value: valueHex,
        gas:   '0x5208',
      }],
    });

    result.style.color = '#3fb950';
    result.textContent = 'Sent! TX: ' + txHash;
  } catch (e) {
    result.style.color = '#f85149';
    result.textContent = 'Error: ' + e.message;
  }
});
</script>
</body>
</html>
